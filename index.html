<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        :root {
            --bg-color: #E2E1DD;
            --text-color: #1a1a1a;
            /* 強制使用系統原始等寬字體 */
            --font-mono: monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            overflow: hidden;
            font-family: var(--font-mono);
        }

        #intro {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s ease;
        }

        #typewriter {
            font-size: clamp(1.5rem, 5vw, 3rem);
            font-weight: normal;
        }

        /* 游標閃爍頻率設定 */
        .cursor {
            display: inline-block;
            /* [修改游標閃爍頻率的地方]：調整下方 0.8s 數值 */
            animation: blink 0.8s step-end infinite;
            font-weight: 100;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        #main {
            display: none;
            height: 100vh;
            opacity: 0;
            transition: opacity 1.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tag-btn {
            padding: 1.5rem 3rem;
            border: 2px solid var(--text-color);
            border-radius: 0;
            font-family: var(--font-mono);
            text-decoration: none;
            color: var(--text-color);
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .tag-btn:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }
    </style>
</head>
<body>

    <div id="intro">
        <h1 id="typewriter"><span id="text"></span><span class="cursor">_</span></h1>
    </div>

    <div id="main">
        <a href="https://www.instagram.com/w_x_yi_?igsh=ZjJhdDFwbXVid2pj" target="_blank" class="tag-btn">
            INSTAGRAM
        </a>
    </div>

    <script>
        const textElement = document.getElementById('text');
        const textContent = "Labelled, yet unlabeled."; 
        
        // --- [調整打字速度的地方] ---
        // baseSpeed: 越小打字越快
        // jitter: 控制節奏不規則程度 (建議設定在 baseSpeed 的 50%-100% 之間)
        const baseSpeed = 110; 
        const jitter = 80;    
        // ------------------------

        let i = 0;

        function typeWriter() {
            if (i < textContent.length) {
                textElement.innerHTML += textContent.charAt(i);
                i++;
                
                // 隨機節奏計算
                const randomDelay = Math.random() * jitter + baseSpeed;
                setTimeout(typeWriter, randomDelay);
            } else {
                // 打字完成後，游標持續閃爍並延遲後淡出
                setTimeout(() => {
                    document.getElementById('intro').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('intro').style.display = 'none';
                        document.getElementById('main').style.display = 'flex';
                        requestAnimationFrame(() => {
                            document.getElementById('main').style.opacity = '1';
                        });
                    }, 1500);
                }, 1500);
            }
        }

        window.onload = typeWriter;
    </script>
</body>
</html>
